name: Verify release images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to pull and verify
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: Verify ${{ inputs.version }} deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify release deployment
        env:
          RELEASE_TAG: ${{ inputs.version }}
          BACKEND_IMAGE: ghcr.io/junwan666/bili-insight-backend:${{ inputs.version }}
          FRONTEND_IMAGE: ghcr.io/junwan666/bili-insight-frontend:${{ inputs.version }}
          WEB_HOST: 127.0.0.1
          WEB_PORT: "8080"
          BACKEND_CPUS: "2.0"
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              docker compose ps || true
              docker compose logs --no-color --tail=200 || true
            fi
            docker compose down --volumes --remove-orphans || true
            exit "$status"
          }
          trap cleanup EXIT

          docker compose pull
          docker compose up --detach --no-build --wait
          curl --fail --silent --show-error http://127.0.0.1:8080/healthz >/dev/null

          expected_version="${RELEASE_TAG#v}"
          actual_version="$(curl --fail --silent --show-error http://127.0.0.1:8080/api/v1/health | python -c 'import json, sys; print(json.load(sys.stdin)["version"])')"
          test "$actual_version" = "$expected_version"

          docker compose images
          docker image inspect "$BACKEND_IMAGE" --format '{{json .RepoDigests}}'
          docker image inspect "$FRONTEND_IMAGE" --format '{{json .RepoDigests}}'
